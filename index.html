<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Weather App</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 20px;
    color: white;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    transition: 0.5s;
}

.container {
    max-width: 650px;
    margin: auto;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    backdrop-filter: blur(10px);
}

h1 {
    margin-bottom: 10px;
}

input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    background: #ff7eb3;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #ff4f81;
}

#weather {
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🌍 Global Weather</h1>

    <!-- Language Selector -->
    <select onchange="changeLang(this.value)">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="ru">Русский</option>
        <option value="ka">ქართული</option>
        <option value="ja">日本語</option>
        <option value="zh_cn">中文</option>
    </select>

    <br>

    <!-- City + Country -->
    <input type="text" id="city" placeholder="City (e.g. Paris)">
    <input type="text" id="country" placeholder="Country code (FR, US, GE)">
    <br>

    <button onclick="getWeather()">Get Weather</button>

    <div id="weather"></div>
</div>

<script>
const apiKey = "YOUR_API_KEY";

let currentLang = "en";

const translations = {
    en: { temp: "Temperature", weather: "Weather", error: "City not found" },
    es: { temp: "Temperatura", weather: "Clima", error: "Ciudad no encontrada" },
    fr: { temp: "Température", weather: "Météo", error: "Ville introuvable" },
    de: { temp: "Temperatur", weather: "Wetter", error: "Stadt nicht gefunden" },
    ru: { temp: "Температура", weather: "Погода", error: "Город не найден" },
    ka: { temp: "ტემპერატურა", weather: "ამინდი", error: "ქალაქი ვერ მოიძებნა" },
    ja: { temp: "気温", weather: "天気", error: "都市が見つかりません" },
    zh_cn: { temp: "温度", weather: "天气", error: "未找到城市" }
};

function changeLang(lang) {
    currentLang = lang;
}

async function getWeather() {
    const city = document.getElementById("city").value;
    const country = document.getElementById("country").value;

    const query = country ? `${city},${country}` : city;

    const res = await fetch(
`https://api.openweathermap.org/data/2.5/weather?q=${query}&appid=${apiKey}&units=metric&lang=${currentLang}`
    );

    const data = await res.json();
    const t = translations[currentLang];

    if (data.cod !== 200) {
        document.getElementById("weather").innerHTML = `❌ ${t.error}`;
        return;
    }

    const weatherMain = data.weather[0].main;

    // Dynamic background
    if (weatherMain === "Rain") {
        document.body.style.background = "linear-gradient(#4e54c8, #8f94fb)";
    } else if (weatherMain === "Clear") {
        document.body.style.background = "linear-gradient(#fceabb, #f8b500)";
    } else if (weatherMain === "Snow") {
        document.body.style.background = "linear-gradient(#e6dada, #274046)";
    } else {
        document.body.style.background = "linear-gradient(#4facfe, #00f2fe)";
    }

    document.getElementById("weather").innerHTML = `
        <h2>${data.name}, ${data.sys.country}</h2>
        <p>${t.temp}: ${data.main.temp} °C</p>
        <p>${t.weather}: ${data.weather[0].description}</p>
    `;
}
</script>

</body>
</html>
