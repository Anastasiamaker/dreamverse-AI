<!DOCTYPE html>

<html>

<head>

<title>DreamVerse AI Camera Scan</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{margin:0;background:radial-gradient(circle at top,#21004a,#020006);color:#00f3ff;font-family:"Courier New",monospace;text-align:center}

h1{color:#bc13fe;text-shadow:0 0 25px #bc13fe}

.box{max-width:850px;margin:25px auto;padding:25px;border:2px solid #bc13fe;box-shadow:0 0 25px #bc13fe;border-radius:18px;background:rgba(0,0,0,.75)}

input,textarea,select,button{width:85%;max-width:600px;padding:13px;margin:9px;border-radius:10px;border:2px solid #00f3ff;background:#050008;color:#00f3ff;font-family:inherit}

button{background:#bc13fe;color:white;cursor:pointer;box-shadow:0 0 15px #bc13fe}

.hidden{display:none}

#cameraBox{position:relative;width:320px;height:240px;margin:20px auto;border:2px solid #00f3ff;box-shadow:0 0 25px #00f3ff;overflow:hidden;border-radius:15px}

video{width:100%;height:100%;object-fit:cover}

.scanLine{position:absolute;left:0;width:100%;height:8px;background:#00f3ff;box-shadow:0 0 25px #00f3ff;animation:scan 2s infinite}

@keyframes scan{0%{top:0}100%{top:240px}}

.card{text-align:left;border:1px solid #00f3ff;box-shadow:0 0 15px #00f3ff;border-radius:14px;padding:18px;margin:15px;background:rgba(0,243,255,.06);white-space:pre-line}

.gold{color:gold;text-shadow:0 0 10px gold}

.purple{color:#bc13fe;text-shadow:0 0 10px #bc13fe}

</style>

</head>

<body>

<h1>DREAMVERSE AI</h1>

<p>Real camera scan + future simulator</p>

<div class="box" id="formBox">

<h2 class="purple">Enter the DreamVerse</h2>

<input id="name" placeholder="Your name">

<input id="age" placeholder="Your age">

<input id="dream" placeholder="Your biggest dream">

<input id="fear" placeholder="Your biggest fear">

<textarea id="goal" placeholder="Your main goal"></textarea>

<select id="type">

<option>Creator</option>

<option>Leader</option>

<option>Genius</option>

<option>Explorer</option>

<option>Healer</option>

</select>

<button onclick="startCamera()">Start Real Face Scan</button>

</div>

<div class="box hidden" id="scanBox">

<h2 class="gold">CAMERA FACE SCAN</h2>

<p>Allow camera permission when your browser asks.</p>

<div id="cameraBox">

<video id="video" autoplay playsinline></video>

<div class="scanLine"></div>

</div>

<p id="scanText">Initializing camera...</p>

<button onclick="analyzeFuture()">Analyze My Future</button>

</div>

<div class="box hidden" id="resultBox">

<h2 class="purple">TRANSMISSION RECEIVED</h2>

<div id="message" class="card"></div>

<h2 class="gold">Secret Warning</h2>

<div id="warning" class="card"></div>

<button onclick="location.reload()">Try Again</button>

</div>

<script>

let user={};

let stream=null;

async function startCamera(){

user.name=name.value||"Unknown Dreamer";

user.age=age.value||"13";

user.dream=dream.value||"change the world";

user.fear=fear.value||"giving up";

user.goal=goal.value||"practice every day";

user.type=type.value;

formBox.classList.add("hidden");

scanBox.classList.remove("hidden");

try{

stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});

video.srcObject=stream;

scanText.innerText="Camera connected. Scanning face energy...";

}catch(error){

scanText.innerText="Camera permission was blocked. You can still continue.";

}

}

function analyzeFuture(){

let steps=[

"Scanning face structure...",

"Reading ambition signal...",

"Detecting hidden fear...",

"Opening future timeline...",

"DreamVerse result unlocked..."

];

let i=0;

let timer=setInterval(()=>{

scanText.innerText=steps[i];

i++;

if(i>=steps.length){

clearInterval(timer);

if(stream){stream.getTracks().forEach(track=>track.stop());}

scanBox.classList.add("hidden");

showResult();

}

},900);

}

function showResult(){

resultBox.classList.remove("hidden");

let text =

`Hello ${user.name}.

DreamVerse AI has completed your scan.

Your future path is: ${user.type}.

Your dream is "${user.dream}".

Your fear is "${user.fear}".

But the scan detected something powerful:

your fear is not stopping you — it is testing you.

If you keep doing this one thing:

"${user.goal}"

then your future self becomes stronger than your current doubts.

SYSTEM MESSAGE:

You are closer than you think.`;

typeText("message",text);

warning.innerText =

"⚠️ Secret warning: The moment you feel unready is exactly when your next level begins.";

speak("DreamVerse scan complete. Your future path has been unlocked.");

}

function typeText(id,text){

let el=document.getElementById(id);

el.innerHTML="";

let i=0;

let timer=setInterval(()=>{

el.innerHTML+=text.charAt(i);

i++;

if(i>=text.length)clearInterval(timer);

},22);

}

function speak(text){

let voice=new SpeechSynthesisUtterance(text);

voice.rate=.9;

voice.pitch=1.1;

speechSynthesis.speak(voice);

}

</script>

</body>

</html>
