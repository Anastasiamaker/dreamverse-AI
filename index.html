<!DOCTYPE html>

<html>

<head>

<title>DreamVerse AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{margin:0;background:radial-gradient(circle at top,#21004a,#020006);color:#00f3ff;font-family:"Courier New",monospace;text-align:center}

h1{color:#bc13fe;text-shadow:0 0 25px #bc13fe;font-size:42px}

.box{max-width:850px;margin:25px auto;padding:25px;border:2px solid #bc13fe;box-shadow:0 0 25px #bc13fe;border-radius:18px;background:rgba(0,0,0,.75)}

input,select,textarea,button{width:85%;max-width:620px;padding:13px;margin:9px;border-radius:10px;border:2px solid #00f3ff;background:#050008;color:#00f3ff;font-family:inherit}

button{background:#bc13fe;color:white;cursor:pointer;box-shadow:0 0 15px #bc13fe}

button:hover{background:#00f3ff;color:black}

.hidden{display:none}

.card{text-align:left;border:1px solid #00f3ff;box-shadow:0 0 15px #00f3ff;border-radius:14px;padding:18px;margin:15px;background:rgba(0,243,255,.06)}

.gold{color:gold;text-shadow:0 0 10px gold}

.purple{color:#bc13fe;text-shadow:0 0 10px #bc13fe}

.scan{height:160px;border:2px solid #00f3ff;position:relative;overflow:hidden;margin:15px;border-radius:12px}

.line{position:absolute;width:100%;height:8px;background:#00f3ff;box-shadow:0 0 25px #00f3ff;animation:scan 2s infinite}

@keyframes scan{0%{top:0}100%{top:160px}}

.glitch{animation:glitch .15s infinite}

@keyframes glitch{0%{transform:translate(1px,1px)}50%{transform:translate(-1px,0)}100%{transform:translate(0,-1px)}}

.bar{height:18px;border:1px solid #00f3ff;margin:8px;border-radius:20px;overflow:hidden}

.fill{height:100%;background:linear-gradient(90deg,#00f3ff,#bc13fe,gold)}

</style>

</head>

<body>

<h1>DREAMVERSE AI</h1>

<p>Your future is being calculated...</p>

<div class="box" id="formBox">

<h2 class="purple">Initialize Consciousness</h2>

<input id="name" placeholder="Full Name">

<input id="age" placeholder="Current Age">

<input id="dream" placeholder="Your Biggest Dream">

<input id="fear" placeholder="Your Greatest Obstacle / Fear">

<textarea id="goal" placeholder="One daily habit to get there..."></textarea>

<select id="type">

<option value="Creator">The Creator</option>

<option value="Leader">The Leader</option>

<option value="Genius">The Genius</option>

<option value="Explorer">The Explorer</option>

<option value="Healer">The Healer</option>

</select>

<button onclick="start()">DECRYPT MY FUTURE</button>

</div>

<div class="box hidden" id="scanBox">

<h2 class="gold">FACELESS MIND SCAN</h2>

<div class="scan"><div class="line"></div></div>

<p id="scanText">Scanning ambition...</p>

</div>

<div class="box hidden" id="resultBox">

<h2 class="purple">TRANSMISSION RECEIVED</h2>

<div id="message" class="card"></div>

<h2 class="gold">Personality Power Chart</h2>

<div class="card">

<p>Ambition</p><div class="bar"><div class="fill" id="b1"></div></div>

<p>Creativity</p><div class="bar"><div class="fill" id="b2"></div></div>

<p>Courage</p><div class="bar"><div class="fill" id="b3"></div></div>

<p>Focus</p><div class="bar"><div class="fill" id="b4"></div></div>

</div>

<h2 class="purple">Secret Warning</h2>

<div id="warning" class="card glitch"></div>

<h2 class="gold">Other Players’ Futures</h2>

<div id="board" class="card"></div>

<button onclick="location.reload()">Try Again</button>

</div>

<script>

let u={};

function start(){

u.name=name.value||"Unknown Dreamer";

u.age=age.value||"13";

u.dream=dream.value||"change the world";

u.fear=fear.value||"giving up";

u.goal=goal.value||"practice every day";

u.type=type.value;

formBox.classList.add("hidden");

scanBox.classList.remove("hidden");

let steps=[

"Scanning ambition...",

"Reading fear patterns...",

"Detecting hidden power...",

"WARNING: rare future energy found...",

"Opening DreamVerse gate..."

];

let i=0;

let timer=setInterval(()=>{

scanText.innerText=steps[i];

i++;

if(i>=steps.length){

clearInterval(timer);

scanBox.classList.add("hidden");

showResult();

}

},1000);

}

function showResult(){

resultBox.classList.remove("hidden");

let text=`Hello ${u.name}.

This is your future self speaking.

You think your dream, "${u.dream}", is far away.

But the DreamVerse detected something unusual in you.

Your fear is "${u.fear}", but it is not your enemy.

It is the final door before your next level.

Your archetype is: ${u.type}.

Your daily key is: ${u.goal}.

SECRET MESSAGE:

In the future, people remember you not because you were perfect,

but because you started before you felt ready.`;

typeText("message",text);

warning.innerHTML="⚠️ Do not ignore the small opportunity that appears when you feel unready.";

b1.style.width=random()+"%";

b2.style.width=random()+"%";

b3.style.width=random()+"%";

b4.style.width=random()+"%";

board.innerHTML=`

<p>Nova_17 → Became a legendary creator.</p>

<p>CyberMoon → Solved the impossible problem.</p>

<p>FutureGhost → Turned fear into fame.</p>

<p>${u.name} → Timeline currently unstable...</p>

`;

speak("DreamVerse scan complete. Your future path has been unlocked.");

}

function random(){return Math.floor(Math.random()*45)+55}

function typeText(id,text){

let el=document.getElementById(id);

el.innerHTML="";

let i=0;

let t=setInterval(()=>{

el.innerHTML+=text.charAt(i);

i++;

if(i>=text.length)clearInterval(t);

},20);

}

function speak(text){

let voice=new SpeechSynthesisUtterance(text);

voice.rate=.9;

voice.pitch=1.1;

speechSynthesis.speak(voice);

}

</script>

</body>

</html>
